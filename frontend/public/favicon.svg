<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>

  <!-- Wallet body -->
  <rect x="10" y="20" width="44" height="30" rx="5" fill="white" opacity="0.95"/>

  <!-- Wallet flap / top edge -->
  <rect x="10" y="18" width="44" height="8" rx="4" fill="white"/>

  <!-- Card slot line -->
  <rect x="10" y="23" width="44" height="2" fill="#2563eb" opacity="0.15"/>

  <!-- Coin circle on right -->
  <circle cx="46" cy="35" r="7" fill="#2563eb" opacity="0.15"/>
  <circle cx="46" cy="35" r="4" fill="#2563eb" opacity="0.5"/>

  <!-- Dollar/upward trend line inside wallet -->
  <polyline points="16,40 22,34 28,38 36,30" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="33,30 36,30 36,33" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>